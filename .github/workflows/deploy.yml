name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Не запускать два деплоя одновременно (сборка на VPS тяжёлая)
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -e
            cd /opt/spor3s-app
            echo "Обновление кода..."
            git pull
            echo "Сборка..."
            npm run build
            echo "Перезапуск приложения..."
            pm2 restart spor3s
            sleep 5
            echo "Проверка здоровья..."
            curl -fsS http://127.0.0.1:3000/api/health
            echo "Деплой завершён: https://ai.spor3s.ru"
